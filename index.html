<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>多人德州扑克 v1</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="title">多人德州扑克 v1</div>
      <div class="sub">房间号联机 · 2-6人 · 纯娱乐无真钱</div>
    </div>
    <div id="status">连接中...</div>
  </header>

  <section class="lobby panel">
    <div class="row">
      <input id="nameInput" placeholder="你的名字" value="玩家" />
      <button id="createBtn">创建房间</button>
      <input id="roomInput" placeholder="房间号" maxlength="4" />
      <button id="joinBtn">加入房间</button>
    </div>
    <div class="room-box" id="roomBox">房间号：未进入</div>
  </section>

  <section class="table panel">
    <div class="table-top">
      <div class="pot-box">底池：<strong id="potText">0</strong></div>
      <div class="street-box" id="streetText">WAITING</div>
      <div class="turn-box" id="turnText">等待开局</div>
    </div>

    <div id="seats" class="seats"></div>

    <div class="community-wrap">
      <div id="community" class="community"></div>
    </div>

    <div class="self-panel">
      <div>你的手牌</div>
      <div id="selfHand" class="self-hand"></div>
    </div>
  </section>

  <section class="actions panel">
    <div id="messageBox" class="message-box">等待加入房间</div>
    <div class="row">
      <button id="readyBtn">Ready / 取消</button>
      <button id="startBtn">开始发牌</button>
      <button id="foldBtn">弃牌</button>
      <button id="callBtn">Check / Call</button>
    </div>
    <div class="row">
      <input id="raiseInput" type="number" value="40" min="20" step="10" />
      <button id="raiseBtn">Bet / Raise</button>
    </div>
  </section>
</div>
<script src="/client.js"></script>
</body>
</html>
