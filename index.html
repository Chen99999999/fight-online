<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>双人联机坦克大战 v1</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="title">双人联机坦克大战 v1</div>
      <div class="sub">房间号联机 · 复古 4399 味儿 · 双人互殴</div>
    </div>
    <div id="status">连接中...</div>
  </header>

  <section class="lobby panel">
    <div class="row stack-mobile">
      <input id="nameInput" placeholder="你的名字" value="玩家" />
    </div>
    <div class="row room-row">
      <button id="createBtn">创建房间</button>
      <input id="roomInput" placeholder="房间号" maxlength="4" />
      <button id="joinBtn">加入房间</button>
    </div>
    <div class="room-box" id="roomBox">房间号：未进入</div>
    <div class="tips">操作：左边控制移动，右边发射。砖墙能打碎，铁墙打不烂。打爆对面坦克 3 条命，直接舒服了。</div>
  </section>

  <section class="hud panel">
    <div class="hp-card"><span id="p1Name">玩家1</span><strong id="p1Hp">3</strong></div>
    <div class="mid-info" id="midInfo">READY</div>
    <div class="hp-card"><span id="p2Name">玩家2</span><strong id="p2Hp">3</strong></div>
  </section>

  <section class="arena panel">
    <canvas id="game" width="800" height="560"></canvas>
    <div id="overlayMsg" class="overlay-msg hidden"></div>
  </section>

  <footer class="controls">
    <div class="joystick-box">
      <div class="joy-title">移动</div>
      <div class="joy-grid">
        <div></div><button data-k="up" class="joy">↑</button><div></div>
        <button data-k="left" class="joy">←</button><button data-k="down" class="joy">↓</button><button data-k="right" class="joy">→</button>
      </div>
    </div>
    <div class="skill-box">
      <div class="joy-title">攻击</div>
      <div class="skill-cluster">
        <button data-k="shoot" class="skill fire">开火</button>
      </div>
      <button id="resetBtn" class="reset">重开</button>
    </div>
  </footer>
</div>
<script src="/client.js"></script>
</body>
</html>
