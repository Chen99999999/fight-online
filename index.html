<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>双人联机PK v3</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="title">双人联机 PK v3</div>
      <div class="sub">近战 + 弹丸 + 能量条 + 处决动画</div>
    </div>
    <div id="status">连接中...</div>
  </header>

  <section class="lobby panel">
    <div class="row stack-mobile">
      <input id="nameInput" placeholder="你的名字" value="玩家" />
      <select id="charSelect">
        <option value="blaze">烈焰方块人</option>
        <option value="frost">寒霜方块人</option>
        <option value="shadow">暗影方块人</option>
      </select>
    </div>
    <div class="row room-row">
      <button id="createBtn">创建房间</button>
      <input id="roomInput" placeholder="房间号" maxlength="4" />
      <button id="joinBtn">加入房间</button>
    </div>
    <div class="room-box" id="roomBox">房间号：未进入</div>
  </section>

  <section class="hud panel">
    <div class="bar-col">
      <div class="name-line"><span id="leftName">玩家1</span><span id="leftHpText">100</span></div>
      <div class="bar hp"><div id="leftHp"></div></div>
      <div class="name-line small"><span>能量</span><span id="leftEnergyText">100</span></div>
      <div class="bar energy"><div id="leftEnergy"></div></div>
    </div>
    <div class="mid-info" id="comboInfo">READY</div>
    <div class="bar-col">
      <div class="name-line"><span id="rightName">玩家2</span><span id="rightHpText">100</span></div>
      <div class="bar hp"><div id="rightHp"></div></div>
      <div class="name-line small"><span>能量</span><span id="rightEnergyText">100</span></div>
      <div class="bar energy"><div id="rightEnergy"></div></div>
    </div>
  </section>

  <section class="arena panel">
    <canvas id="game" width="800" height="460"></canvas>
    <div id="overlayMsg" class="overlay-msg hidden"></div>
    <div id="ultOverlay" class="ult-overlay hidden"><div id="ultText" class="ult-text">终极必杀</div></div>
    <div id="finisherOverlay" class="finisher-overlay hidden"><div id="finisherText" class="finisher-text">处决</div></div>
  </section>

  <footer class="controls">
    <div class="joystick-box">
      <div class="joy-title">移动</div>
      <div class="joy-grid">
        <div></div><button data-k="up" class="joy">↑</button><div></div>
        <button data-k="left" class="joy">←</button><button data-k="down" class="joy">↓</button><button data-k="right" class="joy">→</button>
      </div>
    </div>
    <div class="skill-box">
      <div class="joy-title">攻击</div>
      <div class="skill-cluster">
        <button data-k="light" class="skill light">近战</button>
        <button data-k="heavy" class="skill heavy">重击</button>
        <button data-k="skill" class="skill tech">弹丸</button>
        <button data-k="ult" class="skill ult">必杀</button>
      </div>
      <button id="resetBtn" class="reset">重开</button>
    </div>
  </footer>
</div>
<script src="/client.js"></script>
</body>
</html>
